
set -g set-clipboard on

# ===== CONFIGURATION TMUX FRIENDLY =====

# SOURIS : activer pour scroller, cliquer, redimensionner
set -g mouse on

# HISTORIQUE : 50000 lignes (au lieu de 2000)
set-option -g history-limit 50000

# NUMÉROTATION : commence à 1 (plus logique que 0)
set -g base-index 1
setw -g pane-base-index 1

# COULEURS : 256 couleurs pour un terminal moderne
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# SPLITS INTUITIFS
# Ctrl+b puis | pour split vertical
bind | split-window -h -c "#{pane_current_path}"
# Ctrl+b puis - pour split horizontal
bind - split-window -v -c "#{pane_current_path}"

# RECHARGER CONFIG : Ctrl+b puis r
bind r source-file ~/.tmux.conf \; display "✅ Config rechargée!"

# NAVIGATION entre panes : Alt+flèches (sans Ctrl+b)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# COPIER/COLLER mode vi (optionnel mais pratique)
setw -g mode-keys vi

# STATUS BAR plus lisible
set -g status-style bg=black,fg=white
set -g status-right "#[fg=cyan]%d/%m/%Y %H:%M"


# Entrée en mode copie avec Ctrl+b [  (déjà le cas)
# Début de sélection avec v (comme vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection
# Fin de sélection + copie vers clipboard X11 avec y
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

